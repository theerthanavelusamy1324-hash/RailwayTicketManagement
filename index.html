<html>
    <head>
        <title>Login</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
         <style>
            .card{
                width:350px;
                margin-top:80px;
                margin-left:400px;
                border-radius:20px;
                background:#28324D;
                color:white;
            }
            body{
                background:linear-gradient(to right,#1A1C33,#112D54);
            }
            #front{
                font-size:50px;
            }
            #mail{
                background: #424C65;
                border-radius:10px;
            }
             #password{
                background: #424C65;
                border-radius:10px;
            }
            #mail::placeholder{
                color:white;
            }
            #password::placeholder{
                color:white;
            }
         </style>
    </head>
    <body>
        <div class="container">
            <div class="card p-3">
               <h3 class="text-center" id="front"> <i class="bi bi-train-front text-warning text-center"></i></h3>
                <h3 class="text-center mt-3">Rail<span class="text-warning mt-3">Vista</span></h3>
                <p class="mt-2 text-center">Your Journey,Elevated</p>
                <lable class="mt-2"><i class="bi bi-envelope"></i> Email</lable>
                <input type="email" id="mail" placeholder="name@rail.com" class="form-control mt-3 text-white">
                <lable class="mt-3"><i class="bi bi-lock"></i> Password</lable>
                <input type="password" id="password" placeholder="Password" class="form-control mt-3 text-white">
                <button onclick="login()" class="btn btn-warning mt-4"><i class="bi bi-box-arrow-right"></i>Login</button>
                <p class="mt-3 text-center">Don't have  account?<span class="text-warning mt-3" onclick="create()">Signup</span></p>
            </div>
        </div>
        <script>
            function create(){
                window.location.href="signup.html";
            }
            async function login() {
            let email = document.getElementById("mail").value;
             let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/login?email=${email}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
            if(data == "success"){
                window.location.href = "dashboard.html";
            }
            else{
                alert("Invalid password");
            }
                
            }
        </script>
    </body>
</html>

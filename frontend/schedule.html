<html>
    <head>
        <title>Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
      <style>
        .sidebar{
            background:#191B30;
            width:200px;
            height:100vh;
            position:fixed;
        }
        #logout{
            border-color:white;
            border-radius:10px;
            margin-top:300px;
            width:150px;
        }
        .buttons a:hover{
            background:#453E36;
            
        }
        .search{
            margin-left:400px;
        }
        #activetrain{
            margin-left:70px;
        }
          #scheduletrain{
            margin-left:70px;
        }
          #activetickets{
            margin-left:70px;
        }
          #drivers{
            margin-left:70px;
        }
        #trainfront{
            background:#FFFBE2;
            font-size:20px;
            padding:10px;
            border-radius:20px;
        }
        #calendar{
            background:#E7F3ED;
             font-size:20px;
            padding:10px;
            border-radius:20px;
        }
        #ticket{
            background:#DEFCFE;
             font-size:20px;
            padding:10px;
            border-radius:20px;
        }
        #people{
            background:#F4EEEA;
             font-size:20px;
            padding:10px;
            border-radius:20px;
        }
        .card{
            border-radius:20px;
            border:none;
        }
        #frame{
            width:500px;
            height:300px;
        }
        #map{
            border-color:lightgrey;
            color:black;
            border-radius:10px;
            width:500px;
            background:lightgray;
        }
       
      </style>   
    </head>
    <body class="bg-light">
        <div class="row">
            <div class="col-md-2">
                <div class="sidebar p-3 text-center">
                    <h3 class="text-warning"><i class="train-front"></i>Rail Vista</h3>
                   <div class="buttons">
                    <a href="dashboard.html" class="btn mt-3 text-white"><i class="bi bi-speedometer"></i> Dashboard</a>
                    <a href="schedule.html" class="btn mt-3 text-white"><i class="bi bi-calendar"></i>   Schedule Train</a>
                    <a href="addtrain.html" class="btn mt-3 text-white"><i class="bi bi-plus-circle"></i> Add Train/Driver</a>
                    <a href="book.html" class="btn mt-3 text-white"><i class="bi bi-ticket"></i> Book Ticket</a>
                     <a href="login.html" class="btn text-white" id="logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </div>
                </div>
            </div>
            <div class="col-md-10">
                <h3 class="mt-3">🗓️Schedule Train</h3>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card p-3">
                            <div class="row mt-3">
                                <div class="col">
                                    <p>Source</p>
                                    <input type="text" id="src" placeholder="Enter source" class="form-control mt-2">
                                </div>
                                 <div class="col">
                                    <p>Destination</p>
                                    <input type="text" id="des" placeholder="Enter Destination" class="form-control mt-2">
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col">
                                    <p>Train</p>
                                 <select id="traintype" class="form-select mt-2">
                                    <option value="" disabled selected>No active trains</option>
                                 </select>
                                </div>
                                 <div class="col">
                                    <p>Driver</p>
                                    <select id="drivertype" class="form-select mt-2">
                                    <option value="" disabled selected>Select Driver</option>
                                 </select>
                                </div>
                            </div>
                             <div class="row mt-3">
                                <div class="col">
                                    <p>Departure Time</p>
                                 <input type="time" id="departure" placeholder="--:--" class="form-control mt-2">
                                </div>
                                 <div class="col">
                                    <p>Arrival Time</p>
                                     <input type="time" id="arrival" placeholder="--:--" class="form-control mt-2">
                                </div>
                            </div>
                            <p class="mt-3">Stations(comma ssparated)</p>
                            <input type="text" id="stations" placeholder="Station A,Station B, Station C" class="form-control mt-2">
                            <button onclick="scheduletrain()" class="btn btn-warning mt-4"><i class="bi bi-check-circle"></i>  Schedule Train</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        
                        <iframe id="frame" src="https://www.google.com/maps?q=Bangalore&output=embed"></iframe>
                        <button onclick="viewmap()" class="btn mt-4" id="map"><i class="bi bi-book"></i>  View Map</button>
                    </div>
                </div>
            </div>
            </div>
            <script>
                async function loadtrain() {
                    let response = await fetch(`http://localhost:8080/trains`);
                    let data = await response.json();
                    console.log(data);
                    let options = `
                    <option value="">Select train </option>`;
                    for(let t of data){
                        options +=`
                        <option value=${t.trainname}>${t.trainname}</option>`;

                    }
                    document.getElementById("traintype").innerHTML = options;
                    
                }
                async function loaddriver() {
                    let response = await fetch(`http://localhost:8080/drivers`);
                    let data = await response.json();
                    console.log(data);
                    let options = `<option value="">Select Driver</option>`;
                    for(let d of data){
                        options +=`
                        <option value=${d.drivername}>${d.drivername}</option>`;
                    }
                    document.getElementById("drivertype").innerHTML = options;
                    
                }
                async function scheduletrain() {
                    let source = document.getElementById("src").value;
                      let destination = document.getElementById("des").value;
                      let train = document.getElementById("traintype").value;
                       let driver = document.getElementById("drivertype").value;
                         let depaturetime = document.getElementById("departure").value;
                            let arrivaltime = document.getElementById("arrival").value;
                              let stations = document.getElementById("stations").value;
                              if(!source || !destination || !train || !driver || !depaturetime || !arrivaltime || !stations){
                                alert("Please Enter the details");
                                return;
                              }
                        await fetch(`http://localhost:8080/scheduletrain?source=${source}&destination=${destination}&train=${train}&driver=${driver}&depaturetime=${depaturetime}&arrivaltime=${arrivaltime}&stations=${stations}`);
                        loadschedule();
                        alert("Schedule added successfully");
                        document.getElementById("src").value = "";
                        document.getElementById("des").value = "";
                        document.getElementById("traintype").value = "";
                        document.getElementById("drivertype").value = "";
                        document.getElementById("departure").value = "";
                        document.getElementById("arrival").value = "";
                        document.getElementById("stations").value = "";
                    
                }
                async function loadschedule() {
                let response = await fetch(`http://localhost:8080/scheduledetails`);
                let scheduledata = await response.json();
                    
                }
                loadschedule();
                loadtrain();
                loaddriver();
                function viewmap(){
                    let src = document.getElementById("src").value;
                    let dest = document.getElementById("des").value;
                    document.getElementById("frame").src=`https://www.google.com/maps?q=${encodeURIComponent(src)}+to+${encodeURIComponent(dest)}&output=embed`;
                }
            </script>
            </body>
            </html>

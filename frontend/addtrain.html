    <body class="bg-light">
        <div class="row">
            <div class="col-md-2">
                <div class="sidebar p-3 text-center">
                    <h3 class="text-warning"><i class="train-front"></i>Rail Vista</h3>
                   <div class="buttons">
                    <a href="dashboard.html" class="btn mt-3 text-white"><i class="bi bi-speedometer"></i> Dashboard</a>
                    <a href="schedule.html" class="btn mt-3 text-white"><i class="bi bi-calendar"></i>   Schedule Train</a>
                    <a href="addtrain.html" class="btn mt-3 text-white"><i class="bi bi-plus-circle"></i> Add Train/Driver</a>
                    <a href="book.html" class="btn mt-3 text-white"><i class="bi bi-ticket"></i> Book Ticket</a>
                     <a href="login.html" class="btn text-white" id="logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </div>
                </div>
            </div>
            <div class="col-md-10">
                <h3 class="mt-3">➕ Add new Train & Driver</h3>
                <div class="row mt-5">
                    <div class="col-md-6">
                        <div class="card p-3 text-center">
                            <h3>🧕📖</h3>
                            <h5>Add New Train</h5>
                          <input type="text" id="trainname" class="form-control mt-3" placeholder="Train Name(e.g.,Rajdhani)">
                           <input type="number" id="trainnumber" class="form-control mt-3" placeholder="Train Number(e.g.,12345)">
                           <button onclick="addtrain()" class="btn btn-warning mt-4"><i class="bi bi-train-front"></i>Add Train</button>
                           <p class="mt-3">Train will be active upon addition</p>
                         
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3 text-center">
                              <h3>➕🔍</h3>
                            <h5>Add New Driver</h5>
                          <input type="text" id="drivername" class="form-control mt-3" placeholder="Driver Name">
                           <input type="number" id="drivernumber" class="form-control mt-3" placeholder="License Number">
                           <button onclick="adddriver()" class="btn btn-warning mt-4"><i class="bi bi-phone"></i>Add Driver</button>
                           <p class="mt-3">Driver will be available for scheduling</p>
                        </div>
                    </div>
                </div>

            </div>
            </div>
            <script>
                async function addtrain() {
                let trainname = document.getElementById("trainname").value;
                 let trainnumber = document.getElementById("trainnumber").value;
                 if(!trainname || !trainnumber){
                    alert("Enter the details");
                    return;
                 }
                await fetch(`http://localhost:8080/addtrain?trainname=${trainname}&trainnumber=${trainnumber}`);
                loadtrain();
                alert("Train added successfully");
                document.getElementById("trainname").value = "";
                document.getElementById("trainnumber").value = "";
                    
                }
                async function loadtrain() {
                let response = await fetch(`http://localhost:8080/traindetails`);
                let traindata = await response.json();
          
                    
                }
                loadtrain();
                async function adddriver() {
                let drivername = document.getElementById("drivername").value;
                 let drivernumber = document.getElementById("drivernumber").value;
                 if(!drivername || !drivernumber){
                    alert("Please enter the details");
                    return;
                 }
                 await fetch(`http://localhost:8080/adddriver?drivername=${drivername}&drivernumber=${drivernumber}`);
                 loaddriver();
                 alert("Driver added succesfully");
                 document.getElementById("drivername").value = "";
                  document.getElementById("drivernumber").value = "";
                    
                }
                async function loaddriver() {
                let response = await fetch(`http://localhost:8080/driverdetails`);
                let driverdata = await response.json();
                    
                }
                loaddriver();
            </script>

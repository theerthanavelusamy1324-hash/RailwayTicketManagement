<html>
    <head>
        <title>Signup</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
         <style>
            .card{
                width:400px;
                margin-top:50px;
                margin-left:400px;
                border-radius:20px;
                background:#28324D;
                color:white;
            }
            body{
                background:linear-gradient(to right,#1A1C33,#112D54);
            }
            #front{
                font-size:50px;
            }
            #mail{
                background: #424C65;
                border-radius:10px;
            }
            #name{
                background: #424C65;
                border-radius:10px;
            }
            #phone{
                background: #424C65;
                border-radius:10px;
            }
             #password{
                background: #424C65;
                border-radius:10px;
            }
            #mail::placeholder{
                color:white;
            }
            #password::placeholder{
                color:white;
            }
            #name::placeholder{
                color:white;
            }
            #phone::placeholder{
                color:white;
            }
            #back{
                color:white;
                border-color:white;
                border-radius:10px;

            }
         </style>
    </head>
    <body>
        <div class="container">
            <div class="card p-3">
               <h3 class="text-center" id="front"> <i class="bi bi-train-front text-warning text-center"></i></h3>
                <h3 class="text-center mt-3">Rail<span class="text-warning mt-3">Vista</span></h3>
                <p class="mt-2 text-center">Your Journey,Elevated</p>
                 <lable class="mt-2"><i class="bi bi-person"></i> Full Name</lable>
                <input type="text" id="name" placeholder="Full name" class="form-control mt-3 text-white">
                <lable class="mt-2"><i class="bi bi-envelope"></i> Email</lable>
                <input type="email" id="mail" placeholder="name@rail.com" class="form-control mt-3 text-white">
                 <lable class="mt-2"><i class="bi bi-phone"></i> Phone</lable>
                <input type="number" id="phone" placeholder="+1234567890" class="form-control mt-3 text-white">
                <lable class="mt-3"><i class="bi bi-lock"></i> Password</lable>
                <input type="password" id="password" placeholder="Password" class="form-control mt-3 text-white">
                <button onclick="signup()" class="btn btn-warning mt-4"><i class="bi bi-person-plus"></i>Create Account</button>
                 <button onclick="back()" class="btn mt-4" id="back">Back to Login</button>
                 <p class="mt-3 text-success text-center" id="result"></p>
               
               
            </div>
        </div>
        <script>
            function back(){
                window.location.href="login.html";
            }
            async function signup() {
                let otp = Math.floor(100000 + Math.random() * 900000);
                alert("Your otp is " + otp);
                window.location.href = "otp.html";
            let name = document.getElementById("name").value;
             let email = document.getElementById("mail").value;
              let phone = document.getElementById("phone").value;
               let password = document.getElementById("password").value;
            let response = await fetch(`http://localhost:8080/signup?name=${name}&email=${email}&phone=${phone}&password=${password}`,
                {
                    method:"POST"
                }
            );
            let data = await response.text();
            document.getElementById("result").innerHTML = data;
                
            }
        </script>
    </body>
</html>

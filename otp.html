<html>
    <head>
        <title>OTP</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
         <style>
            .card{
                width:350px;
                margin-top:80px;
                margin-left:400px;
                border-radius:20px;
                background:#28324D;
                color:white;
            }
            body{
                background:linear-gradient(to right,#1A1C33,#112D54);
            }
            #cancel{
                border-color:white;
                border-radius:10px;
                color:white;
            }
            #otp{
                background:#424C65;
            }
            #otp::placeholder{
                text-align:center;
                color:white;
                font-size:20px;
            }
         </style>
         
    </head>
    <body>
        <div class="container">
            <div class="card p-3">
                 <h3 class="text-center" id="front"> <i class="bi bi-train-front text-warning text-center"></i></h3>
                <h3 class="text-center mt-3">Rail<span class="text-warning mt-3">Vista</span></h3>
                <p class="mt-2 text-center">Your Journey,Elevated</p>
                  <p class="mt-2 text-center">Enter OTP Send to<span class="text-warning">asifa</span></p>
                  <input type="number" id="otp" placeholder="0 0 0 0 0 0" class="form-control mt-3">
                  <button onclick="verify()" class="btn btn-warning mt-4">Verify OTP</button>
                    <button onclick="cancel()" class="btn mt-4" id="cancel">Verify OTP</button>
            </div>
        </div>
        <script>
            function verify(){
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
